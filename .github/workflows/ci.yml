name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  python-test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package and dev dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Lint (critical syntax/runtime rules)
        run: python -m ruff check . --select E9,F63,F7,F82

      - name: Unit and integration tests
        run: python -m pytest tests/ -v

      - name: Smoke release flow
        run: python scripts/smoke_release.py

      - name: Backend API tests
        run: python -m pytest interface/backend/tests -q

      - name: Smoke interface backend flow
        run: python scripts/smoke_interface.py

  frontend-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: interface/frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: interface/frontend
        run: npm ci

      - name: Frontend tests
        working-directory: interface/frontend
        run: npm run test

      - name: Frontend build
        working-directory: interface/frontend
        run: npm run build
